# ════════════════════════════════════════════════════════════════
#  CRM Agent WhatsApp — Stack de Infraestrutura
#  Etapa 0: apenas PostgreSQL + Redis.
#  Os serviços de aplicação (wa-daemon, ai-worker, crm-panel) serão
#  adicionados nas etapas seguintes, conforme forem implementados.
# ════════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:17-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Daemon WhatsApp (Baileys) ───────────────────────────────────
  # Sempre ligado, reconecta sozinho. Sessão persistida via bind-mount.
  wa-daemon:
    build:
      context: .
      dockerfile: services/wa-daemon/Dockerfile
    container_name: crm-wa-daemon
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-crm_db}?schema=public"
      REDIS_URL: "redis://redis:6379"
      WA_AUTH_DIR: /app/baileys-auth
      WA_DAEMON_PORT: "3001"
      WA_SEND_RATE_PER_MIN: "${WA_SEND_RATE_PER_MIN:-12}"
      WA_SEND_MIN_DELAY_MS: "${WA_SEND_MIN_DELAY_MS:-2000}"
      WA_SEND_MAX_DELAY_MS: "${WA_SEND_MAX_DELAY_MS:-8000}"
    ports:
      - "${WA_DAEMON_PORT:-3001}:3001"
    volumes:
      # Persistência da sessão WhatsApp — sobrevive a rebuilds/restart.
      - ./baileys-auth:/app/baileys-auth
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Worker de IA (classifica leads + gera respostas) ────────────
  # Consome o canal crm:new-message publicado pelo wa-daemon.
  ai-worker:
    build:
      context: .
      dockerfile: services/ai-worker/Dockerfile
    container_name: crm-ai-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-crm_db}?schema=public"
      REDIS_URL: "redis://redis:6379"
      # Chave de criptografia da API key (lê do .env do host).
      AI_CONFIG_ENCRYPTION_KEY: "${AI_CONFIG_ENCRYPTION_KEY}"
      AI_CLASSIFY_MIN_MESSAGES: "${AI_CLASSIFY_MIN_MESSAGES:-10}"

volumes:
  postgres-data:
    name: crm-postgres-data
  redis-data:
    name: crm-redis-data
